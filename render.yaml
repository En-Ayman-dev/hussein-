services:
  - type: web
    name: hussein-backend
    runtime: python
    region: frankfurt
    plan: starter
    buildCommand: cd backend && pip install -r requirements.txt
    startCommand: cd backend && python run.py
    healthCheckPath: /api/health
    autoDeployTrigger: commit
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: hussein-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: hussein-cache
          property: connectionString
      - key: OPENAI_API_KEY
        sync: false
      - key: CORS_ALLOWED_ORIGINS
        sync: false
      - key: CORS_ALLOWED_ORIGIN_REGEX
        value: ^https://.*\\.vercel\\.app$

  - type: keyvalue
    name: hussein-cache
    region: frankfurt
    plan: starter
    maxmemoryPolicy: allkeys-lru
    ipAllowList: []

databases:
  - name: hussein-db
    region: frankfurt
    plan: basic-256mb
    databaseName: hussein
    postgresMajorVersion: "17"
